<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BME688 Realtime Plot</title>
    <script src="{{ url_for('static', filename='chart.umd.min.js') }}"></script>
    <style>
        :root {
            --bg: #f3f6f9;
            --card: #ffffff;
            --ink: #1b2a3a;
            --accent: #007a6c;
            --muted: #5b6b7b;
            --border: #d7e0e8;
        }
        body {
            margin: 0;
            background: radial-gradient(circle at 0% 0%, #dff4f1 0%, var(--bg) 45%);
            color: var(--ink);
            font-family: "Segoe UI", "Yu Gothic UI", sans-serif;
        }
        .wrap {
            max-width: 1100px;
            margin: 24px auto;
            padding: 0 16px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 10px 28px rgba(27, 42, 58, 0.08);
        }
        h1 {
            margin: 0 0 12px;
            font-size: 1.35rem;
        }
        .meta {
            color: var(--muted);
            font-size: 0.95rem;
            margin-bottom: 10px;
            line-height: 1.6;
        }
        .canvas-wrap {
            height: 62vh;
            min-height: 320px;
        }
        .toolbar {
            margin-bottom: 12px;
        }
        .btn {
            border: 1px solid var(--border);
            background: #e8f7f4;
            color: var(--ink);
            border-radius: 8px;
            padding: 8px 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:hover {
            background: #daf1ec;
        }
        .port-control {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 12px;
        }
        .port-control select {
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 0.95rem;
        }
        .port-control .btn {
            padding: 6px 12px;
            font-size: 0.9rem;
        }
        .comm-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .comm-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            background: #d64545;
            box-shadow: 0 0 0 2px rgba(214, 69, 69, 0.2);
        }
        .comm-dot.ok {
            background: #2a9d49;
            box-shadow: 0 0 0 2px rgba(42, 157, 73, 0.2);
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <h1>BME688 Realtime Graph</h1>
            <div class="meta">
                <div>Sensor ID: <span id="sensorid">-</span></div>
                <div>Serial port: <span id="serial">-</span></div>
                <div>Status: <span id="status">-</span></div>
                <div>Communication: <span class="comm-indicator"><span id="commdot" class="comm-dot"></span><span id="commtext">abnormal</span></span></div>
                <div>Log file: <span id="logfile">-</span></div>
                <div>Mode: <span id="mode">raw</span></div>
                <div>Reset at: <span id="resetat">-</span></div>
            </div>
            <div class="port-control">
                <select id="portSelect">
                    <option value="">-- Select COM Port --</option>
                </select>
                <button id="connToggleBtn" class="btn" type="button">Connect</button>
            </div>
            <div class="toolbar">
                <button id="resetBtn" class="btn" type="button">Reset</button>
            </div>
            <div class="canvas-wrap">
                <canvas id="chart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const colors = [
            '#e63946', '#f4a261', '#ffb703', '#2a9d8f', '#00a6fb',
            '#4361ee', '#7b2cbf', '#8338ec', '#ff006e', '#6c757d'
        ];

        const datasets = Array.from({ length: 10 }, (_, ch) => ({
            label: `D${ch}`,
            data: [],
            borderColor: colors[ch],
            backgroundColor: colors[ch],
            pointRadius: 0,
            tension: 0,
            borderWidth: 2,
        }));

        const ctx = document.getElementById('chart');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { datasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                parsing: false,
                animation: false,
                scales: {
                    x: {
                        type: 'linear',
                        title: { display: true, text: 'Time [s] (relative)' }
                    },
                    y: {
                        title: { display: true, text: 'Current value (or delta after Reset)' }
                    }
                },
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });

        let xAutoRange = true;
        let isPanning = false;
        let lastPanX = 0;

        function getDataBoundsX() {
            let minX = null;
            let maxX = null;
            for (const ds of datasets) {
                for (const p of ds.data) {
                    if (typeof p.x !== 'number') {
                        continue;
                    }
                    minX = (minX === null) ? p.x : Math.min(minX, p.x);
                    maxX = (maxX === null) ? p.x : Math.max(maxX, p.x);
                }
            }
            return { minX, maxX };
        }

        function getPixelXFromEvent(event) {
            const rect = ctx.getBoundingClientRect();
            return event.clientX - rect.left;
        }

        function onWheelZoom(event) {
            event.preventDefault();

            const xScale = chart.scales.x;
            if (!xScale) {
                return;
            }

            const pixelX = getPixelXFromEvent(event);
            const centerX = xScale.getValueForPixel(pixelX);
            if (typeof centerX !== 'number' || Number.isNaN(centerX)) {
                return;
            }

            const { minX: dataMin, maxX: dataMax } = getDataBoundsX();
            if (dataMin === null || dataMax === null) {
                return;
            }

            const currentMin = (typeof xScale.min === 'number') ? xScale.min : dataMin;
            const currentMax = (typeof xScale.max === 'number') ? xScale.max : dataMax;
            const currentRange = currentMax - currentMin;
            if (currentRange <= 0) {
                return;
            }

            const zoomIn = event.deltaY < 0;
            const factor = zoomIn ? 0.85 : 1.15;
            let nextMin = centerX - (centerX - currentMin) * factor;
            let nextMax = centerX + (currentMax - centerX) * factor;

            const minRange = 0.2;
            if (nextMax - nextMin < minRange) {
                const half = minRange / 2;
                nextMin = centerX - half;
                nextMax = centerX + half;
            }

            if (nextMin < dataMin) {
                const shift = dataMin - nextMin;
                nextMin += shift;
                nextMax += shift;
            }
            if (nextMax > dataMax) {
                const shift = nextMax - dataMax;
                nextMin -= shift;
                nextMax -= shift;
            }

            nextMin = Math.max(nextMin, dataMin);
            nextMax = Math.min(nextMax, dataMax);
            if (nextMax - nextMin < minRange) {
                nextMin = dataMin;
                nextMax = dataMax;
            }

            const fullRangeEps = 1e-6;
            const isFullRange =
                Math.abs(nextMin - dataMin) <= fullRangeEps &&
                Math.abs(nextMax - dataMax) <= fullRangeEps;

            if (!zoomIn && isFullRange) {
                xAutoRange = true;
                chart.options.scales.x.min = undefined;
                chart.options.scales.x.max = undefined;
            } else {
                xAutoRange = false;
                chart.options.scales.x.min = nextMin;
                chart.options.scales.x.max = nextMax;
            }
            chart.update('none');
        }

        ctx.addEventListener('wheel', onWheelZoom, { passive: false });

        function onPanStart(event) {
            if (event.button !== 0) {
                return;
            }
            isPanning = true;
            lastPanX = getPixelXFromEvent(event);
            ctx.style.cursor = 'grabbing';
            event.preventDefault();
        }

        function onPanMove(event) {
            if (!isPanning) {
                return;
            }

            const xScale = chart.scales.x;
            if (!xScale) {
                return;
            }

            const { minX: dataMin, maxX: dataMax } = getDataBoundsX();
            if (dataMin === null || dataMax === null) {
                return;
            }

            const currentPixelX = getPixelXFromEvent(event);
            const currentMin = (typeof xScale.min === 'number') ? xScale.min : dataMin;
            const currentMax = (typeof xScale.max === 'number') ? xScale.max : dataMax;
            const currentRange = currentMax - currentMin;
            if (currentRange <= 0 || currentRange >= (dataMax - dataMin)) {
                lastPanX = currentPixelX;
                return;
            }

            const prevValue = xScale.getValueForPixel(lastPanX);
            const currValue = xScale.getValueForPixel(currentPixelX);
            if (typeof prevValue !== 'number' || typeof currValue !== 'number') {
                lastPanX = currentPixelX;
                return;
            }

            const deltaValue = currValue - prevValue;
            let nextMin = currentMin - deltaValue;
            let nextMax = currentMax - deltaValue;

            if (nextMin < dataMin) {
                const shift = dataMin - nextMin;
                nextMin += shift;
                nextMax += shift;
            }
            if (nextMax > dataMax) {
                const shift = nextMax - dataMax;
                nextMin -= shift;
                nextMax -= shift;
            }

            xAutoRange = false;
            chart.options.scales.x.min = nextMin;
            chart.options.scales.x.max = nextMax;
            chart.update('none');
            lastPanX = currentPixelX;
            event.preventDefault();
        }

        function onPanEnd() {
            isPanning = false;
            ctx.style.cursor = 'default';
        }

        ctx.addEventListener('mousedown', onPanStart);
        ctx.addEventListener('mousemove', onPanMove);
        window.addEventListener('mouseup', onPanEnd);
        ctx.addEventListener('mouseleave', onPanEnd);

        async function doReset() {
            try {
                const resp = await fetch('/reset', { method: 'POST' });
                if (!resp.ok) {
                    throw new Error(`HTTP ${resp.status}`);
                }

                xAutoRange = true;
                isPanning = false;
                ctx.style.cursor = 'default';
                chart.options.scales.x.min = undefined;
                chart.options.scales.x.max = undefined;
                for (const ds of datasets) {
                    ds.data = [];
                }
                chart.update('none');

                await refresh();
            } catch (err) {
                document.getElementById('status').textContent = `error: ${err.message}`;
            }
        }
        document.getElementById('resetBtn').addEventListener('click', doReset);

        async function refresh() {
            try {
                const resp = await fetch('/data');
                if (!resp.ok) {
                    throw new Error(`HTTP ${resp.status}`);
                }
                const payload = await resp.json();

                document.getElementById('serial').textContent = payload.serial_port;
                document.getElementById('logfile').textContent = payload.log_file || '-';
                document.getElementById('status').textContent = payload.status;
                document.getElementById('mode').textContent = payload.mode || 'raw';
                document.getElementById('resetat').textContent = payload.reset_at ?? '-';
                isConnected = !!payload.running;
                updateToggleButton();
                updateCommIndicator(!!payload.comm_ok);

                for (let ch = 0; ch < 10; ch += 1) {
                    const key = String(ch);
                    datasets[ch].data = payload.channels[key] || [];
                }

                if (xAutoRange) {
                    chart.options.scales.x.min = undefined;
                    chart.options.scales.x.max = undefined;
                }
                chart.update('none');
            } catch (err) {
                document.getElementById('status').textContent = `error: ${err.message}`;
                updateCommIndicator(false);
            }
        }

        setInterval(refresh, {{ update_ms }});
        refresh();

        // Port management functions
        let lastPortList = [];
        let isConnected = false;

        function updateCommIndicator(isOk) {
            const dot = document.getElementById('commdot');
            const text = document.getElementById('commtext');
            if (!dot || !text) return;
            if (isOk) {
                dot.classList.add('ok');
                text.textContent = 'normal';
            } else {
                dot.classList.remove('ok');
                text.textContent = 'abnormal';
            }
        }

        function updateToggleButton() {
            const btn = document.getElementById('connToggleBtn');
            const select = document.getElementById('portSelect');
            if (!btn) return;
            btn.textContent = isConnected ? 'Disconnect' : 'Connect';
            if (select) {
                select.disabled = isConnected;
            }
        }

        async function refreshPortList() {
            try {
                const resp = await fetch('/api/ports');
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();
                
                const select = document.getElementById('portSelect');
                if (!select) {
                    console.error('portSelect element not found');
                    return;
                }
                const prevValue = select.value;  // Save current selection
                
                // Build the port list with default option
                const newPortList = data.ports || [];
                
                // Check if port list changed
                const listChanged = JSON.stringify(lastPortList) !== JSON.stringify(newPortList);
                
                if (listChanged) {
                    // Only update DOM if ports have changed
                    select.innerHTML = '<option value="">-- Select COM Port --</option>';
                    newPortList.forEach(port => {
                        const option = document.createElement('option');
                        option.value = port;
                        option.textContent = port;
                        select.appendChild(option);
                    });
                    lastPortList = newPortList;
                }
                
                // Restore server-side port if connected, otherwise keep user selection
                if (data.current && newPortList.includes(data.current)) {
                    select.value = data.current;
                } else if (prevValue && newPortList.includes(prevValue)) {
                    select.value = prevValue;
                } else {
                    select.value = '';
                }
            } catch (err) {
                console.error('Failed to refresh ports:', err);
            }
        }

        async function connectPort() {
            const port = document.getElementById('portSelect').value;
            if (!port) {
                alert('Please select a COM port');
                return;
            }
            try {
                const resp = await fetch(`/api/connect/${encodeURIComponent(port)}`, { method: 'POST' });
                if (!resp.ok) {
                    const data = await resp.json();
                    throw new Error(data.message || `HTTP ${resp.status}`);
                }
                const data = await resp.json();
                console.log(data.message);
                await refresh();
            } catch (err) {
                alert(`Connection failed: ${err.message}`);
                document.getElementById('status').textContent = `error: ${err.message}`;
                updateCommIndicator(false);
            }
        }

        async function disconnectPort() {
            try {
                const resp = await fetch('/api/disconnect', { method: 'POST' });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                console.log('Disconnection requested');
                await refresh();
            } catch (err) {
                alert(`Disconnection failed: ${err.message}`);
                document.getElementById('status').textContent = `error: ${err.message}`;
                updateCommIndicator(false);
            }
        }

        async function toggleConnection() {
            if (isConnected) {
                await disconnectPort();
            } else {
                await connectPort();
            }
        }

        // Port control buttons
        document.getElementById('connToggleBtn').addEventListener('click', toggleConnection);

        // Refresh port list periodically
        refreshPortList();
        setInterval(refreshPortList, 2000);

        async function fetchSensorId() {
            try {
                const resp = await fetch('/id');
                if (!resp.ok) {
                    throw new Error(`HTTP ${resp.status}`);
                }
                const payload = await resp.json();
                if (payload.ok) {
                    document.getElementById('sensorid').textContent = '0x' + payload.id.toUpperCase().padStart(8, '0');
                } else {
                    document.getElementById('sensorid').textContent = `error: ${payload.message}`;
                }
            } catch (err) {
                document.getElementById('sensorid').textContent = `error: ${err.message}`;
            }
        }
        fetchSensorId();
    </script>
</body>
</html>
