<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scent Web Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <style>
        * { box-sizing: border-box; }

        :root {
            --bg-a: #e7f7f3;
            --bg-b: #f5fbff;
            --card: #ffffff;
            --ink: #16313a;
            --muted: #4f6a74;
            --line: #d3e1e8;
            --accent: #0f9d8f;
            --accent-strong: #0a7b70;
            --warn: #c85724;
            --ok: #1f8f3e;
            --bad: #cc3f3f;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            color: var(--ink);
            font-family: "BIZ UDPGothic", "Yu Gothic", "Meiryo", sans-serif;
            background:
                radial-gradient(circle at 8% 8%, #c7eee6 0%, transparent 34%),
                radial-gradient(circle at 90% 86%, #d6ecff 0%, transparent 36%),
                linear-gradient(140deg, var(--bg-a), var(--bg-b));
        }

        .page {
            width: 100%;
            height: 100%;
            padding: 16px;
        }

        .panel {
            width: 100%;
            height: 100%;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            box-shadow: 0 10px 28px rgba(22, 49, 58, 0.11);
            display: flex;
            flex-direction: column;
            min-height: 0;
            animation: rise 320ms ease;
        }

        .header {
            padding: 14px 16px 8px;
            border-bottom: 1px solid #edf3f6;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.1rem, 1.1rem + 0.8vw, 1.6rem);
            letter-spacing: 0.01em;
        }

        .meta {
            margin-top: 8px;
            color: var(--muted);
            line-height: 1.65;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 2px 14px;
            font-size: 0.95rem;
        }

        .controls {
            padding: 10px 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 1px solid #edf3f6;
            align-items: center;
        }

        .controls-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .label {
            font-size: 0.9rem;
            color: var(--muted);
            margin-right: 2px;
        }

        .input,
        .select,
        .btn {
            border: 1px solid var(--line);
            border-radius: 8px;
            height: 36px;
            font-size: 0.92rem;
        }

        .input,
        .select {
            padding: 0 10px;
            background: #fff;
            color: var(--ink);
        }

        .btn {
            padding: 0 14px;
            font-weight: 700;
            cursor: pointer;
            background: #ebf7f5;
            color: var(--ink);
            transition: background 120ms ease, transform 120ms ease;
        }

        .btn:hover:not(:disabled) {
            background: #dff2ef;
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .btn.primary {
            border-color: transparent;
            background: var(--accent);
            color: #fff;
        }

        .btn.primary:hover:not(:disabled) {
            background: var(--accent-strong);
        }

        .btn.warn {
            border-color: transparent;
            background: var(--warn);
            color: #fff;
        }

        .btn.danger-soft {
            border-color: #d6a1a1;
            background: #fff5f5;
            color: #8d2222;
        }

        .btn.danger-soft:hover:not(:disabled) {
            background: #ffeaea;
        }

        .danger-zone {
            display: flex;
            justify-content: flex-end;
            flex: 0 0 auto;
        }

        .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            vertical-align: middle;
            margin-right: 6px;
            background: var(--bad);
            box-shadow: 0 0 0 2px rgba(204, 63, 63, 0.2);
        }

        .dot.ok {
            background: var(--ok);
            box-shadow: 0 0 0 2px rgba(31, 143, 62, 0.2);
        }

        .chart-wrap {
            flex: 1 1 0;
            min-height: 0;
            padding: 10px 14px 14px;
            position: relative;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) {
            html, body { overflow: auto; }
            .page { height: auto; min-height: 100%; }
            .panel { height: auto; min-height: 100%; }
            .chart-wrap { height: 54vh; min-height: 340px; }
            .header-top {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="panel">
            <div class="header">
                <div class="header-top">
                    <h1>Scent Static Web Viewer</h1>
                    <div class="danger-zone">
                        <button id="deleteAllBtn" class="btn danger-soft" type="button">Delete All Sessions</button>
                    </div>
                </div>
                <div class="meta">
                    <div>Device ID: <span id="sensorId">-</span></div>
                    <div>Connection: <span id="commText"><span id="commDot" class="dot"></span>disconnected</span></div>
                    <div>Status: <span id="status">idle</span></div>
                    <div>Session: <span id="sessionInfo">none</span></div>
                    <div>Latest RX: <span id="latestRxLine">-</span></div>
                </div>
            </div>

            <div class="controls">
                <div class="controls-group">
                    <button id="connectionToggleBtn" class="btn primary" type="button">Connect</button>
                </div>

                <div class="controls-group">
                    <span class="label">Session name</span>
                    <input id="sessionNameInput" class="input" type="text" maxlength="80" placeholder="e.g. calibration_01" />
                    <button id="sessionToggleBtn" class="btn primary" type="button" disabled>Start Session</button>
                </div>

                <div class="controls-group">
                    <span class="label">Saved session</span>
                    <select id="sessionSelect" class="select"></select>
                    <button id="downloadBtn" class="btn" type="button">Download ZIP</button>
                    <button id="deleteBtn" class="btn" type="button">Delete</button>
                </div>
            </div>

            <div class="chart-wrap">
                <canvas id="chart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const BAUD_RATE = 115200;
        const STORAGE_KEY = "scent.sessions.v1";
        const STRICT_CRC = true;
        const CRC8_TABLE = [
            0x00, 0x31, 0x62, 0x53, 0xC4, 0xF5, 0xA6, 0x97, 0xB9, 0x88, 0xDB, 0xEA, 0x7D, 0x4C, 0x1F, 0x2E,
            0x43, 0x72, 0x21, 0x10, 0x87, 0xB6, 0xE5, 0xD4, 0xFA, 0xCB, 0x98, 0xA9, 0x3E, 0x0F, 0x5C, 0x6D,
            0x86, 0xB7, 0xE4, 0xD5, 0x42, 0x73, 0x20, 0x11, 0x3F, 0x0E, 0x5D, 0x6C, 0xFB, 0xCA, 0x99, 0xA8,
            0xC5, 0xF4, 0xA7, 0x96, 0x01, 0x30, 0x63, 0x52, 0x7C, 0x4D, 0x1E, 0x2F, 0xB8, 0x89, 0xDA, 0xEB,
            0x0C, 0x3D, 0x6E, 0x5F, 0xC8, 0xF9, 0xAA, 0x9B, 0xB5, 0x84, 0xD7, 0xE6, 0x71, 0x40, 0x13, 0x22,
            0x4F, 0x7E, 0x2D, 0x1C, 0x8B, 0xBA, 0xE9, 0xD8, 0xF6, 0xC7, 0x94, 0xA5, 0x32, 0x03, 0x50, 0x61,
            0x8A, 0xBB, 0xE8, 0xD9, 0x4E, 0x7F, 0x2C, 0x1D, 0x33, 0x02, 0x51, 0x60, 0xF7, 0xC6, 0x95, 0xA4,
            0xC9, 0xF8, 0xAB, 0x9A, 0x0D, 0x3C, 0x6F, 0x5E, 0x70, 0x41, 0x12, 0x23, 0xB4, 0x85, 0xD6, 0xE7,
            0x18, 0x29, 0x7A, 0x4B, 0xDC, 0xED, 0xBE, 0x8F, 0xA1, 0x90, 0xC3, 0xF2, 0x65, 0x54, 0x07, 0x36,
            0x5B, 0x6A, 0x39, 0x08, 0x9F, 0xAE, 0xFD, 0xCC, 0xE2, 0xD3, 0x80, 0xB1, 0x26, 0x17, 0x44, 0x75,
            0x9E, 0xAF, 0xFC, 0xCD, 0x5A, 0x6B, 0x38, 0x09, 0x27, 0x16, 0x45, 0x74, 0xE3, 0xD2, 0x81, 0xB0,
            0xDD, 0xEC, 0xBF, 0x8E, 0x19, 0x28, 0x7B, 0x4A, 0x64, 0x55, 0x06, 0x37, 0xA0, 0x91, 0xC2, 0xF3,
            0x14, 0x25, 0x76, 0x47, 0xD0, 0xE1, 0xB2, 0x83, 0xAD, 0x9C, 0xCF, 0xFE, 0x69, 0x58, 0x0B, 0x3A,
            0x57, 0x66, 0x35, 0x04, 0x93, 0xA2, 0xF1, 0xC0, 0xEE, 0xDF, 0x8C, 0xBD, 0x2A, 0x1B, 0x48, 0x79,
            0xB2, 0x83, 0xD0, 0xE1, 0x76, 0x47, 0x14, 0x25, 0x0B, 0x3A, 0x69, 0x58, 0xCF, 0xFE, 0xAD, 0x9C,
            0xF1, 0xC0, 0x93, 0xA2, 0x35, 0x04, 0x57, 0x66, 0x48, 0x79, 0x2A, 0x1B, 0x8C, 0xBD, 0xEE, 0xDF
        ];
        const DATASET_COLORS = [
            "#e63946", "#f4a261", "#ffb703", "#2a9d8f", "#00a6fb",
            "#4361ee", "#7b2cbf", "#8338ec", "#ff006e", "#6c757d"
        ];

        const state = {
            port: null,
            reader: null,
            writer: null,
            readLoopActive: false,
            readBuffer: "",
            isConnected: false,
            liveStartMs: 0,
            lastRxMs: 0,
            sensorId: "-",
            sessions: loadSessions(),
            currentSession: null,
            persistTimer: null,
            xAutoRange: true,
            isPanning: false,
            lastPanX: 0
        };

        const datasets = Array.from({ length: 10 }, (_, ch) => ({
            label: `D${ch}`,
            data: [],
            borderColor: DATASET_COLORS[ch],
            backgroundColor: DATASET_COLORS[ch],
            pointRadius: 0,
            tension: 0,
            borderWidth: 2
        }));

        const dom = {
            connectionToggleBtn: document.getElementById("connectionToggleBtn"),
            sessionToggleBtn: document.getElementById("sessionToggleBtn"),
            sessionNameInput: document.getElementById("sessionNameInput"),
            sessionSelect: document.getElementById("sessionSelect"),
            downloadBtn: document.getElementById("downloadBtn"),
            deleteBtn: document.getElementById("deleteBtn"),
            deleteAllBtn: document.getElementById("deleteAllBtn"),
            sensorId: document.getElementById("sensorId"),
            latestRxLine: document.getElementById("latestRxLine"),
            status: document.getElementById("status"),
            commDot: document.getElementById("commDot"),
            commText: document.getElementById("commText"),
            sessionInfo: document.getElementById("sessionInfo"),
            chartCanvas: document.getElementById("chart")
        };

        const chart = new Chart(dom.chartCanvas, {
            type: "line",
            data: { datasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                parsing: false,
                animation: false,
                scales: {
                    x: { type: "linear", title: { display: true, text: "Time [s]" } },
                    y: { title: { display: true, text: "Current" } }
                },
                plugins: { legend: { position: "bottom" } }
            }
        });

        function nowIso() {
            return new Date().toISOString();
        }

        function setStatus(text) {
            dom.status.textContent = text;
        }

        function updateCommUi(isOk) {
            if (isOk) {
                dom.commDot.classList.add("ok");
                dom.commText.lastChild.textContent = "connected";
            } else {
                dom.commDot.classList.remove("ok");
                dom.commText.lastChild.textContent = "disconnected";
            }
        }

        function updateButtons() {
            const running = !!state.currentSession && !state.currentSession.endIso;
            const hasSensorId = !!state.sensorId && state.sensorId !== "-";
            const hasSavedSessions = state.sessions.length > 0;

            dom.connectionToggleBtn.disabled = false;
            dom.connectionToggleBtn.textContent = state.isConnected ? "Disconnect" : "Connect";
            dom.connectionToggleBtn.classList.toggle("primary", !state.isConnected);
            dom.connectionToggleBtn.classList.toggle("warn", state.isConnected);

            dom.sessionToggleBtn.disabled = running ? false : (!state.isConnected || !hasSensorId);
            dom.sessionToggleBtn.textContent = running ? "Stop Session" : "Start Session";
            dom.sessionToggleBtn.classList.toggle("primary", !running);
            dom.sessionToggleBtn.classList.toggle("warn", running);

            dom.downloadBtn.disabled = !hasSavedSessions;
            dom.deleteBtn.disabled = !hasSavedSessions;
            dom.deleteAllBtn.disabled = !hasSavedSessions;
        }

        function loadSessions() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return [];
                const parsed = JSON.parse(raw);
                return Array.isArray(parsed) ? parsed : [];
            } catch (err) {
                console.error("Failed to parse localStorage sessions", err);
                return [];
            }
        }

        function saveSessions() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state.sessions));
        }

        function schedulePersist() {
            if (state.persistTimer) {
                return;
            }
            state.persistTimer = setTimeout(() => {
                state.persistTimer = null;
                saveSessions();
                refreshSessionSelect();
            }, 400);
        }

        function refreshSessionSelect() {
            const prev = dom.sessionSelect.value;
            dom.sessionSelect.innerHTML = "";

            if (state.sessions.length === 0) {
                const opt = document.createElement("option");
                opt.value = "";
                opt.textContent = "No sessions";
                dom.sessionSelect.appendChild(opt);
                return;
            }

            state.sessions
                .slice()
                .sort((a, b) => (a.startIso < b.startIso ? 1 : -1))
                .forEach((s) => {
                    const opt = document.createElement("option");
                    opt.value = s.id;
                    const nameText = (s.name || "").trim();
                    const endText = s.endIso ? new Date(s.endIso).toLocaleTimeString("ja-JP", { hour12: false }) : "running";
                    opt.textContent = `${nameText ? `${nameText} - ` : ""}${new Date(s.startIso).toLocaleString("ja-JP")} (${s.records.length} rows, end: ${endText})`;
                    dom.sessionSelect.appendChild(opt);
                });

            dom.sessionSelect.value = state.sessions.some((s) => s.id === prev) ? prev : state.sessions[state.sessions.length - 1].id;
        }

        function getCurrentSessionRowCount() {
            if (!state.currentSession) return 0;
            return state.currentSession.records.length;
        }

        function updateSessionInfo() {
            if (!state.currentSession) {
                dom.sessionInfo.textContent = "none";
                return;
            }
            const endText = state.currentSession.endIso ? `, ended ${new Date(state.currentSession.endIso).toLocaleTimeString("ja-JP", { hour12: false })}` : ", running";
            const nameText = (state.currentSession.name || "").trim();
            dom.sessionInfo.textContent = `${nameText ? `${nameText}, ` : ""}${new Date(state.currentSession.startIso).toLocaleTimeString("ja-JP", { hour12: false })}${endText}, rows ${getCurrentSessionRowCount()}`;
        }

        function clearChartData() {
            for (const ds of datasets) {
                ds.data = [];
            }
            state.xAutoRange = true;
            state.isPanning = false;
            chart.options.scales.x.min = undefined;
            chart.options.scales.x.max = undefined;
            chart.update("none");
        }

        function drawCurrentSession() {
            clearChartData();
            if (!state.currentSession) {
                return;
            }
            const baselineCurrents = Array(10).fill(null);
            let baselineReady = false;
            for (const row of state.currentSession.records) {
                if (row.ch < 0 || row.ch > 9) continue;
                if (baselineCurrents[row.ch] === null) {
                    baselineCurrents[row.ch] = row.current;
                }
                if (!baselineReady) {
                    baselineReady = baselineCurrents.every((v) => v !== null);
                }
                if (!baselineReady) {
                    continue;
                }
                datasets[row.ch].data.push({ x: row.t, y: row.current - baselineCurrents[row.ch] });
            }
            chart.update("none");
        }

        function getDataBoundsX() {
            let minX = null;
            let maxX = null;
            for (const ds of datasets) {
                for (const p of ds.data) {
                    if (typeof p.x !== "number") continue;
                    minX = minX === null ? p.x : Math.min(minX, p.x);
                    maxX = maxX === null ? p.x : Math.max(maxX, p.x);
                }
            }
            return { minX, maxX };
        }

        function getPixelXFromEvent(event) {
            const rect = dom.chartCanvas.getBoundingClientRect();
            return event.clientX - rect.left;
        }

        function onWheelZoom(event) {
            event.preventDefault();
            const xScale = chart.scales.x;
            if (!xScale) return;

            const pixelX = getPixelXFromEvent(event);
            const centerX = xScale.getValueForPixel(pixelX);
            if (typeof centerX !== "number" || Number.isNaN(centerX)) return;

            const { minX: dataMin, maxX: dataMax } = getDataBoundsX();
            if (dataMin === null || dataMax === null) return;

            const currentMin = typeof xScale.min === "number" ? xScale.min : dataMin;
            const currentMax = typeof xScale.max === "number" ? xScale.max : dataMax;
            if (currentMax - currentMin <= 0) return;

            const factor = event.deltaY < 0 ? 0.85 : 1.15;
            let nextMin = centerX - (centerX - currentMin) * factor;
            let nextMax = centerX + (currentMax - centerX) * factor;

            const minRange = 0.2;
            if (nextMax - nextMin < minRange) {
                const half = minRange / 2;
                nextMin = centerX - half;
                nextMax = centerX + half;
            }

            if (nextMin < dataMin) {
                const shift = dataMin - nextMin;
                nextMin += shift;
                nextMax += shift;
            }
            if (nextMax > dataMax) {
                const shift = nextMax - dataMax;
                nextMin -= shift;
                nextMax -= shift;
            }

            nextMin = Math.max(nextMin, dataMin);
            nextMax = Math.min(nextMax, dataMax);

            const fullRange = Math.abs(nextMin - dataMin) <= 1e-6 && Math.abs(nextMax - dataMax) <= 1e-6;
            if (event.deltaY >= 0 && fullRange) {
                state.xAutoRange = true;
                chart.options.scales.x.min = undefined;
                chart.options.scales.x.max = undefined;
            } else {
                state.xAutoRange = false;
                chart.options.scales.x.min = nextMin;
                chart.options.scales.x.max = nextMax;
            }
            chart.update("none");
        }

        function onPanStart(event) {
            if (event.button !== 0) return;
            state.isPanning = true;
            state.lastPanX = getPixelXFromEvent(event);
            dom.chartCanvas.style.cursor = "grabbing";
            event.preventDefault();
        }

        function onPanMove(event) {
            if (!state.isPanning) return;
            const xScale = chart.scales.x;
            if (!xScale) return;

            const { minX: dataMin, maxX: dataMax } = getDataBoundsX();
            if (dataMin === null || dataMax === null) return;

            const currentPixelX = getPixelXFromEvent(event);
            const currentMin = typeof xScale.min === "number" ? xScale.min : dataMin;
            const currentMax = typeof xScale.max === "number" ? xScale.max : dataMax;

            if (currentMax - currentMin <= 0 || currentMax - currentMin >= dataMax - dataMin) {
                state.lastPanX = currentPixelX;
                return;
            }

            const prevValue = xScale.getValueForPixel(state.lastPanX);
            const currValue = xScale.getValueForPixel(currentPixelX);
            if (typeof prevValue !== "number" || typeof currValue !== "number") {
                state.lastPanX = currentPixelX;
                return;
            }

            const delta = currValue - prevValue;
            let nextMin = currentMin - delta;
            let nextMax = currentMax - delta;

            if (nextMin < dataMin) {
                const shift = dataMin - nextMin;
                nextMin += shift;
                nextMax += shift;
            }
            if (nextMax > dataMax) {
                const shift = nextMax - dataMax;
                nextMin -= shift;
                nextMax -= shift;
            }

            state.xAutoRange = false;
            chart.options.scales.x.min = nextMin;
            chart.options.scales.x.max = nextMax;
            chart.update("none");
            state.lastPanX = currentPixelX;
            event.preventDefault();
        }

        function onPanEnd() {
            state.isPanning = false;
            dom.chartCanvas.style.cursor = "default";
        }

        function crc8FromFirmwareTable(text) {
            let crc = 0;
            for (let i = 0; i < text.length; i += 1) {
                crc = CRC8_TABLE[(crc ^ (text.charCodeAt(i) & 0xff)) & 0xff];
            }
            return crc;
        }

        function parseSensorLine(line) {
            const parts = line.trim().split(",");
            if (parts.length < 6) return null;

            const rawCh = parts[0].trim();
            const rawTemp = parts[1].trim();
            const rawHumidity = parts[2].trim();
            const rawPressure = parts[3].trim();
            const rawCurrent = parts[4].trim();
            const received = (parts[5] || "").trim().toUpperCase();

            const ch = Number(rawCh);
            const temp = Number(rawTemp);
            const humidity = Number(rawHumidity);
            const pressure = Number(rawPressure);
            const current = Number(rawCurrent);

            if (!Number.isInteger(ch) || ch < 0 || ch > 9) return null;
            if ([temp, humidity, pressure, current].some((v) => Number.isNaN(v))) return null;

            // Firmware calculates CRC from the raw CSV text fields (before numeric parsing).
            const dataStr = [rawCh, rawTemp, rawHumidity, rawPressure, rawCurrent].join(",");
            const calcValue = crc8FromFirmwareTable(dataStr) & 0xff;
            const receivedValue = Number.parseInt(received, 16);
            if (!Number.isFinite(receivedValue)) {
                return null;
            }
            const crcOk = calcValue === (receivedValue & 0xff);

            return { ch, temp, humidity, pressure, current, crcOk };
        }

        function onCrcError(line) {
            console.warn("CRC mismatch", { line });
        }

        async function connectDevice() {
            try {
                if (!navigator.serial) {
                    throw new Error("Web Serial API is not supported on this browser");
                }

                state.port = await navigator.serial.requestPort();
                await state.port.open({ baudRate: BAUD_RATE });

                state.writer = state.port.writable ? state.port.writable.getWriter() : null;
                state.reader = state.port.readable ? state.port.readable.getReader() : null;
                if (!state.reader) {
                    throw new Error("Serial readable stream is unavailable");
                }

                state.readLoopActive = true;
                state.readBuffer = "";
                state.isConnected = true;
                state.sensorId = "-";
                dom.sensorId.textContent = "-";
                dom.latestRxLine.textContent = "-";
                state.liveStartMs = Date.now();
                state.lastRxMs = Date.now();
                setStatus("connected");
                updateCommUi(true);
                updateButtons();

                try {
                    // Multi-cycle polling-based ID read (3 cycles x 2 seconds = up to 6 seconds)
                    let idReadSuccess = false;
                    const pollIntervalMs = 100;
                    const cycleDurationMs = 2000;
                    const maxCycles = 3;
                    
                    for (let cycle = 1; cycle <= maxCycles && !idReadSuccess; cycle++) {
                        // Send ID command at start of each cycle
                        try {
                            await sendCommand("id\n");
                        } catch (sendErr) {
                            console.warn(`ID command send failed on cycle ${cycle}:`, sendErr);
                        }
                        
                        // Poll for response during this cycle (3 seconds)
                        const cycleStartMs = Date.now();
                        while (!idReadSuccess && Date.now() - cycleStartMs < cycleDurationMs) {
                            if (state.sensorId && state.sensorId !== "-") {
                                idReadSuccess = true;
                                console.log(`ID read successful on cycle ${cycle}`);
                            } else {
                                await new Promise(resolve => setTimeout(resolve, pollIntervalMs));
                            }
                        }
                    }
                    
                    if (!idReadSuccess) {
                        console.warn(`ID read timeout (${maxCycles * cycleDurationMs / 1000} seconds elapsed)`);
                    }
                } catch (idErr) {
                    console.warn("ID read failed:", idErr);
                }

                readLoop();
            } catch (err) {
                console.error(err);
                await disconnectDevice(true);
                setStatus(`connect error: ${err.message || err}`);
            }
        }

        async function disconnectDevice(silent) {
            if (state.currentSession && !state.currentSession.endIso) {
                stopSession();
            }

            state.readLoopActive = false;

            try {
                if (state.reader) {
                    await state.reader.cancel();
                    state.reader.releaseLock();
                }
            } catch (err) {
                console.warn(err);
            }

            try {
                if (state.writer) {
                    state.writer.releaseLock();
                }
            } catch (err) {
                console.warn(err);
            }

            try {
                if (state.port) {
                    await state.port.close();
                }
            } catch (err) {
                console.warn(err);
            }

            state.reader = null;
            state.writer = null;
            state.port = null;
            state.isConnected = false;
            dom.latestRxLine.textContent = "-";
            updateButtons();
            updateCommUi(false);

            if (!silent) {
                setStatus("disconnected");
            }
        }

        async function readLoop() {
            while (state.readLoopActive && state.reader) {
                try {
                    const { value, done } = await state.reader.read();
                    if (done) break;
                    if (!value) continue;

                    state.lastRxMs = Date.now();
                    updateCommUi(true);

                    state.readBuffer += new TextDecoder().decode(value, { stream: true });
                    let idx;
                    while ((idx = state.readBuffer.indexOf("\n")) >= 0) {
                        const line = state.readBuffer.slice(0, idx).replace(/\r$/, "");
                        state.readBuffer = state.readBuffer.slice(idx + 1);
                        handleSerialLine(line);
                    }
                } catch (err) {
                    if (state.readLoopActive) {
                        setStatus(`read error: ${err.message || err}`);
                    }
                    break;
                }
            }
        }

        function handleSerialLine(line) {
            if (!line) return;

            dom.latestRxLine.textContent = line;

            if (line.startsWith("ID,")) {
                const idText = line.split(",", 2)[1] || "";
                state.sensorId = idText;
                dom.sensorId.textContent = idText ? `0x${idText.toUpperCase().padStart(8, "0")}` : "-";
                updateButtons();
                return;
            }

            const row = parseSensorLine(line);
            if (!row) {
                return;
            }

            if (!row.crcOk) {
                onCrcError(line);
                if (STRICT_CRC) {
                    return;
                }
            }

            const sessionRunning = !!state.currentSession && !state.currentSession.endIso;
            if (!sessionRunning) {
                return;
            }
            const baseMs = Date.parse(state.currentSession.startIso);
            const t = (Date.now() - baseMs) / 1000;

            if (state.currentSession.baselineCurrents[row.ch] === null) {
                state.currentSession.baselineCurrents[row.ch] = row.current;
            }
            if (!state.currentSession.baselineReady) {
                state.currentSession.baselineReady = state.currentSession.baselineCurrents.every((v) => v !== null);
            }

            if (state.currentSession.baselineReady) {
                const relativeCurrent = row.current - state.currentSession.baselineCurrents[row.ch];
                datasets[row.ch].data.push({ x: t, y: relativeCurrent });
                if (datasets[row.ch].data.length > 5000) {
                    datasets[row.ch].data.shift();
                }
            }

            const record = {
                t,
                ch: row.ch,
                temp: row.temp,
                humidity: row.humidity,
                pressure: row.pressure,
                current: row.current
            };
            state.currentSession.records.push(record);
            updateSessionInfo();
            schedulePersist();

            if (state.xAutoRange) {
                chart.options.scales.x.min = undefined;
                chart.options.scales.x.max = undefined;
            }
            chart.update("none");
        }

        async function sendCommand(text) {
            if (!state.writer) {
                throw new Error("Serial writer is unavailable");
            }
            const bytes = new TextEncoder().encode(text);
            await state.writer.write(bytes);
        }

        function startSession() {
            if (!state.isConnected) {
                setStatus("connect first");
                return;
            }
            if (state.currentSession && !state.currentSession.endIso) {
                setStatus("session already running");
                return;
            }

            clearChartData();
            const sid = (globalThis.crypto && typeof globalThis.crypto.randomUUID === "function")
                ? globalThis.crypto.randomUUID()
                : `${Date.now()}-${Math.random().toString(16).slice(2)}`;

            state.currentSession = {
                id: sid,
                name: (dom.sessionNameInput.value || "").trim(),
                startIso: nowIso(),
                endIso: null,
                sensorId: state.sensorId,
                baselineCurrents: Array(10).fill(null),
                baselineReady: false,
                records: []
            };

            state.sessions.push(state.currentSession);
            saveSessions();
            refreshSessionSelect();
            dom.sessionSelect.value = state.currentSession.id;
            updateSessionInfo();
            updateButtons();
            setStatus("session started");
        }

        function stopSession() {
            if (!state.currentSession || state.currentSession.endIso) {
                return;
            }
            state.currentSession.endIso = nowIso();
            saveSessions();
            refreshSessionSelect();
            updateSessionInfo();
            updateButtons();
            setStatus("session ended");
        }

        function getSelectedSession() {
            const id = dom.sessionSelect.value;
            return state.sessions.find((s) => s.id === id) || null;
        }

        function escapeCsv(value) {
            const text = String(value ?? "");
            if (/[",\n]/.test(text)) {
                return `"${text.replace(/"/g, '""')}"`;
            }
            return text;
        }

        function pad2(value) {
            return String(value).padStart(2, "0");
        }

        function pad3(value) {
            return String(value).padStart(3, "0");
        }

        function formatPythonDataTimestamp(date) {
            return `${date.getFullYear()}/${pad2(date.getMonth() + 1)}/${pad2(date.getDate())} `
                + `${pad2(date.getHours())}:${pad2(date.getMinutes())}:${pad2(date.getSeconds())}.${pad3(date.getMilliseconds())}`;
        }

        function formatFixed(value, digits) {
            const n = Number(value);
            return Number.isFinite(n) ? n.toFixed(digits) : "";
        }

        function buildRawSessionCsvText(session) {
            const lines = [
                "session_id,start_iso,end_iso,sensor_id,t,ch,temp,humidity,pressure,current"
            ];
            for (const r of session.records) {
                lines.push([
                    session.id,
                    session.startIso,
                    session.endIso || "",
                    session.sensorId || "",
                    r.t.toFixed(3),
                    r.ch,
                    r.temp,
                    r.humidity,
                    r.pressure,
                    r.current
                ].map(escapeCsv).join(","));
            }
            return lines.join("\n");
        }

        function buildPythonDataCsvText(session) {
            const rows = [
                "timestamp,temp,humidity,pressure,d0,d1,d2,d3,d4,d5,d6,d7,d8,d9,rel_d0,rel_d1,rel_d2,rel_d3,rel_d4,rel_d5,rel_d6,rel_d7,rel_d8,rel_d9"
            ];
            const currents = Array(10).fill(null);
            const seen = new Set();
            const sessionStartMs = Date.parse(session.startIso);
            let baselineCurrents = null;

            for (const r of session.records) {
                if (!Number.isInteger(r.ch) || r.ch < 0 || r.ch > 9) {
                    continue;
                }
                currents[r.ch] = r.current;
                seen.add(r.ch);

                if (seen.size < 10) {
                    continue;
                }

                const ts = new Date(sessionStartMs + Math.round(r.t * 1000));
                if (!baselineCurrents) {
                    baselineCurrents = currents.map((v) => Number(v));
                }
                const relativeCurrents = currents.map((v, idx) => Number(v) - baselineCurrents[idx]);
                const line = [
                    formatPythonDataTimestamp(ts),
                    formatFixed(r.temp, 2),
                    formatFixed(r.humidity, 2),
                    formatFixed(r.pressure, 2),
                    ...currents.map((v) => formatFixed(v, 3)),
                    ...relativeCurrents.map((v) => formatFixed(v, 3))
                ].join(",");
                rows.push(line);
                seen.clear();
            }
            return rows.join("\n");
        }

        function getSessionFileStem(session) {
            const start = session.startIso.replace(/[:.]/g, "-");
            const rawName = (session.name || "").trim();
            const safeName = rawName
                .replace(/[<>:"/\\|?*\x00-\x1F]/g, "_")
                .replace(/\s+/g, "_")
                .replace(/[. ]+$/g, "")
                .slice(0, 60);
            return safeName ? `scent_session_${safeName}_${start}` : `scent_session_${start}`;
        }

        async function downloadSessionZip(session) {
            if (!session) {
                alert("No session selected");
                return;
            }

            if (typeof JSZip === "undefined") {
                alert("ZIP library is not loaded.");
                return;
            }

            const stem = getSessionFileStem(session);
            const rawCsv = buildRawSessionCsvText(session);
            const pythonDataCsv = buildPythonDataCsvText(session);

            const zip = new JSZip();
            zip.file(`${stem}_raw.csv`, rawCsv);
            zip.file(`${stem}_data.csv`, pythonDataCsv);

            const zipBlob = await zip.generateAsync({ type: "blob" });
            const url = URL.createObjectURL(zipBlob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `${stem}.zip`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        }

        function deleteSelectedSession() {
            const session = getSelectedSession();
            if (!session) {
                return;
            }
            const yes = window.confirm("Delete selected session from local storage?");
            if (!yes) return;

            state.sessions = state.sessions.filter((s) => s.id !== session.id);
            saveSessions();
            refreshSessionSelect();

            if (state.currentSession && state.currentSession.id === session.id) {
                state.currentSession = null;
                clearChartData();
                updateSessionInfo();
                updateButtons();
            }
        }

        function deleteAllSessions() {
            if (state.sessions.length === 0) {
                setStatus("no sessions to delete");
                return;
            }

            const yes = window.confirm(`Delete ALL ${state.sessions.length} sessions from local storage?`);
            if (!yes) return;

            const token = window.prompt("Type DELETE to confirm deleting all sessions", "");
            if (token !== "DELETE") {
                setStatus("delete all canceled");
                return;
            }

            state.sessions = [];
            state.currentSession = null;
            clearChartData();
            saveSessions();
            refreshSessionSelect();
            updateSessionInfo();
            updateButtons();
            setStatus("all sessions deleted");
        }

        function maybeUpdateCommHealth() {
            if (!state.isConnected) {
                updateCommUi(false);
                return;
            }
            const ok = Date.now() - state.lastRxMs <= 10000;
            updateCommUi(ok);
        }

        function onSessionSelectChanged() {
            const selected = getSelectedSession();
            if (!selected) {
                return;
            }
            state.currentSession = selected;
            drawCurrentSession();
            updateSessionInfo();
            updateButtons();
            setStatus(selected.endIso ? "session loaded" : "running session loaded");
        }

        async function toggleConnection() {
            if (state.isConnected) {
                await disconnectDevice(false);
            } else {
                await connectDevice();
            }
            updateButtons();
        }

        function toggleSession() {
            const running = !!state.currentSession && !state.currentSession.endIso;
            if (running) {
                stopSession();
            } else {
                startSession();
            }
            updateButtons();
        }

        dom.connectionToggleBtn.addEventListener("click", toggleConnection);
        dom.sessionToggleBtn.addEventListener("click", toggleSession);
        dom.downloadBtn.addEventListener("click", async () => {
            try {
                await downloadSessionZip(getSelectedSession());
            } catch (err) {
                console.error(err);
                setStatus(`download error: ${err.message || err}`);
            }
        });
        dom.deleteBtn.addEventListener("click", deleteSelectedSession);
        dom.deleteAllBtn.addEventListener("click", deleteAllSessions);
        dom.sessionSelect.addEventListener("change", onSessionSelectChanged);

        dom.chartCanvas.addEventListener("wheel", onWheelZoom, { passive: false });
        dom.chartCanvas.addEventListener("mousedown", onPanStart);
        dom.chartCanvas.addEventListener("mousemove", onPanMove);
        dom.chartCanvas.addEventListener("mouseleave", onPanEnd);
        window.addEventListener("mouseup", onPanEnd);

        if (window.ResizeObserver) {
            const resizeObserver = new ResizeObserver(() => chart.resize());
            resizeObserver.observe(dom.chartCanvas.parentElement);
        }

        refreshSessionSelect();
        if (state.sessions.length > 0) {
            dom.sessionSelect.value = state.sessions[state.sessions.length - 1].id;
            onSessionSelectChanged();
        } else {
            updateSessionInfo();
        }
        updateButtons();
        maybeUpdateCommHealth();
        setInterval(maybeUpdateCommHealth, 1000);

        window.addEventListener("beforeunload", () => {
            if (state.currentSession && !state.currentSession.endIso) {
                state.currentSession.endIso = nowIso();
            }
            saveSessions();
        });
    </script>
</body>
</html>
